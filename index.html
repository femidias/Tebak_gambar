<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tebak Gambar & Suara - Femi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }

        /* Navigasi Huruf A-Z */
        .alphabet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(35px, 1fr));
            gap: 5px;
            width: 100%;
            background: rgba(255, 255, 255, 0.5);
            padding: 10px;
            border-radius: 15px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .letter-btn {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 2px solid #3498db;
            border-radius: 8px;
            font-weight: bold;
            color: #3498db;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .letter-btn.disabled {
            background: #2c3e50;
            color: #7f8c8d;
            border-color: #2c3e50;
            cursor: not-allowed;
            opacity: 0.8;
        }

        /* Area Game Utama */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            width: 100%;
            backdrop-filter: blur(5px);
        }

        .image-wrapper {
            width: 100%;
            position: relative;
            padding-top: 75%; 
            margin-bottom: 10px;
        }

        #game-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 15px;
            cursor: pointer;
            border: 5px solid #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        #display-text {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            font-weight: 900;
            color: #2c3e50;
            margin: 10px 0;
            min-height: 1.2em;
        }

        /* Tombol Kontrol Utama */
        .main-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-action {
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: transform 0.1s, background 0.2s;
            color: white;
        }

        .btn-answer { background-color: #f39c12; }
        .btn-next { background-color: #27ae60; }
        .btn-action:active { transform: scale(0.95); }

        /* Papan Tulis (Tracing) */
        .tracing-container {
            background: #ffffff;
            border-radius: 15px;
            border: 2px dashed #3498db;
            position: relative;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 160px;
            cursor: crosshair;
            touch-action: none;
        }

        .canvas-controls {
            display: flex;
            justify-content: center;
            padding: 8px;
            background: #f8f9fa;
        }

        .btn-clear {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

<div class="main-layout">
    <div id="alphabet-container" class="alphabet-grid"></div>

    <div class="container">
        <div class="image-wrapper">
            <img id="game-image" src="" alt="Klik Gambar" onclick="handleKlikGambar()">
        </div>
        
        <div id="display-text">?</div>

        <div class="main-controls">
            <button class="btn-action btn-answer" onclick="tampilkanJawabanManual()">Lihat Jawaban</button>
            <button class="btn-action btn-next" onclick="acakGame()">Ganti Gambar</button>
        </div>

        <div class="tracing-container">
            <div style="font-size: 0.65rem; color: #7f8c8d; padding: 5px 0;">Tiru hurufnya di sini:</div>
            <canvas id="tracingCanvas"></canvas>
            <div class="canvas-controls">
                <button class="btn-clear" onclick="resetPapan()">Hapus Tulisan</button>
            </div>
        </div>
    </div>
</div>

<audio id="game-audio"></audio>

<script>
    const daftarData = [
      { huruf: 'a - ayam', kode: 'a', gambar: 'img/a.jpeg', suara: 'audio/a.mp3' },
      { huruf: 'b - bebek', kode: 'b', gambar: 'img/b.jpeg', suara: 'audio/b.mp3' },
      { huruf: 'c - cical', kode: 'c', gambar: 'img/c.jpeg', suara: 'audio/c.mp3' },
      { huruf: 'd - domba', kode: 'd', gambar: 'img/d.jpeg', suara: 'audio/d.mp3' },
      { huruf: 'e - elang', kode: 'e', gambar: 'img/e.jpeg', suara: 'audio/e.mp3' },
      { huruf: 'f - foto', kode: 'f', gambar: 'img/f.jpeg', suara: 'audio/f.mp3' },
      { huruf: 'g - gajah', kode: 'g', gambar: 'img/g.jpeg', suara: 'audio/g.mp3' },
      { huruf: 'h - harimau', kode: 'h', gambar: 'img/h.jpeg', suara: 'audio/h.mp3' },
      { huruf: 'i - ikan', kode: 'i', gambar: 'img/i.jpeg', suara: 'audio/i.mp3' },
      { huruf: 'J - jerapah', kode: 'j', gambar: 'img/j.jpeg', suara: 'audio/j.mp3' },
      { huruf: 'k - kucing', kode: 'k', gambar: 'img/k.jpeg', suara: 'audio/k.mp3' },
      { huruf: 'l - lalat', kode: 'l', gambar: 'img/l.jpeg', suara: 'audio/l.mp3' },
      { huruf: 'm - meja', kode: 'm', gambar: 'img/m.jpeg', suara: 'audio/m.mp3' },
      { huruf: 'n - nyamuk', kode: 'n', gambar: 'img/n.jpeg', suara: 'audio/n.mp3' },
      { huruf: 'o - obat', kode: 'o', gambar: 'img/o.jpeg', suara: 'audio/o.mp3' },
      { huruf: 'p - panda', kode: 'P', gambar: 'img/p.jpeg', suara: 'audio/p.mp3' },
      { huruf: 'r - roda', kode: 'r', gambar: 'img/r.jpeg', suara: 'audio/r.mp3' },
      { huruf: 's - sepatu', kode: 's', gambar: 'img/s.jpeg', suara: 'audio/s.mp3' },
      { huruf: 't - tas', kode: 't', gambar: 'img/t.jpeg', suara: 'audio/t.mp3' },
      { huruf: 'u - ular', kode: 'u', gambar: 'img/u.jpeg', suara: 'audio/u.mp3' },
      { huruf: 'w - wajan', kode: 'w', gambar: 'img/w.jpeg', suara: 'audio/w.mp3' },
      { huruf: 'y - yoyo', kode: 'y', gambar: 'img/y.jpeg', suara: 'audio/y.mp3' },
    ];

    let dataSekarang = {};
    let statusJawabanTerbuka = false;

    const canvas = document.getElementById('tracingCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function initCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#2980b9';
    }

    function startPosition(e) { drawing = true; draw(e); }
    function finishedPosition() { drawing = false; ctx.beginPath(); }

    function draw(e) {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        const x = clientX - rect.left;
        const y = clientY - rect.top;
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function buatBayanganHuruf() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.font = "bold 130px 'Segoe UI'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(52, 152, 219, 0.12)";
        ctx.fillText(dataSekarang.kode, canvas.width / 2, canvas.height / 2);
    }

    function resetPapan() { buatBayanganHuruf(); }

    function buatMenuHuruf() {
        const container = document.getElementById('alphabet-container');
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(huruf => {
            const btn = document.createElement('div');
            btn.className = 'letter-btn';
            btn.innerText = huruf;
            const dataItem = daftarData.find(d => d.kode === huruf);
            if (dataItem) {
                btn.onclick = () => { dataSekarang = dataItem; tampilkanSoal(); };
            } else { btn.classList.add('disabled'); }
            container.appendChild(btn);
        });
    }

    function handleKlikGambar() {
        if (!statusJawabanTerbuka) { tampilkanJawaban(); statusJawabanTerbuka = true; } 
        else { acakGame(); }
    }

    function tampilkanJawabanManual() {
        tampilkanJawaban();
        statusJawabanTerbuka = true;
    }

    function acakGame() {
        const indeksAcak = Math.floor(Math.random() * daftarData.length);
        dataSekarang = daftarData[indeksAcak];
        tampilkanSoal();
    }

    function tampilkanSoal() {
        statusJawabanTerbuka = false;
        document.getElementById('game-image').src = dataSekarang.gambar;
        document.getElementById('display-text').innerText = "?";
        document.getElementById('display-text').style.color = "#2c3e50";
        setTimeout(buatBayanganHuruf, 50);
    }

    function tampilkanJawaban() {
        document.getElementById('display-text').innerText = dataSekarang.huruf;
        document.getElementById('display-text').style.color = "#e67e22";
        const audio = document.getElementById('game-audio');
        audio.src = dataSekarang.suara;
        audio.play().catch(e => {});
    }

    canvas.addEventListener('mousedown', startPosition);
    canvas.addEventListener('mouseup', finishedPosition);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('touchstart', (e) => { startPosition(e); e.preventDefault(); }, {passive: false});
    canvas.addEventListener('touchend', finishedPosition);
    canvas.addEventListener('touchmove', (e) => { draw(e); e.preventDefault(); }, {passive: false});

    window.onload = () => { initCanvas(); buatMenuHuruf(); acakGame(); };
</script>
</body>
</html>
